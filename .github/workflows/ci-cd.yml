name: CI/CD Pipeline

on:
  push:
    branches:  main
  pull_request:
    branches:  main

jobs:
  # ===================================================
  # Backend Testing Job
  # ===================================================
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run Pytest
        run: |
          pytest backend/

  # ===================================================
  # Frontend Validation Job
  # ===================================================
  frontend-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: |
          cd frontend
          npm install --legacy-peer-deps

      - name: Run Typecheck and Build
        run: |
          cd frontend
          chmod +x node_modules/.bin/* || true
          npm run build

  # ===================================================
  # Docker Build Job
  # ===================================================
  docker-build:
    needs: [backend-test, frontend-check]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Lowercase Repository Name
        run: |
          echo "IMAGE_REPOSITORY=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Log in to Docker Hub (disabled by default, uncomment with secrets configured)
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Backend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/backend.Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/three-tier-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/three-tier-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Frontend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/frontend.Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/three-tier-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/three-tier-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===================================================
  # Kubernetes Manifest Validation & Deploy Job
  # ===================================================
  kubernetes-deploy:
    needs: docker-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Kubeconform
        run: |
          wget https://github.com/yannh/kubeconform/releases/download/v0.6.6/kubeconform-linux-amd64.tar.gz
          tar -xf kubeconform-linux-amd64.tar.gz
          sudo mv kubeconform /usr/local/bin/

      - name: Validate Kubernetes Manifests
        run: |
          kubeconform -summary -ignore-missing-schemas k8s/

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update Kubeconfig
        run: |
          aws eks update-kubeconfig --name ${{ secrets.EKS_CLUSTER_NAME }} --region ${{ secrets.AWS_REGION }}

      - name: Replace Image Tags in Manifests
        run: |
          sed -i 's|three-tier-backend:latest|${{ secrets.DOCKERHUB_USERNAME }}/three-tier-backend:${{ github.sha }}|g' k8s/backend/deployment.yaml
          sed -i 's|three-tier-frontend:latest|${{ secrets.DOCKERHUB_USERNAME }}/three-tier-frontend:${{ github.sha }}|g' k8s/frontend/deployment.yaml

      - name: Deploy to Amazon EKS
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/config/
          kubectl apply -f k8s/database/
          kubectl apply -f k8s/backend/
          kubectl apply -f k8s/frontend/
          kubectl apply -f k8s/ingress/
          kubectl apply -f k8s/bonus/
