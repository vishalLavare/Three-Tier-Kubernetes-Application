      #     namespace: three-tier-app
      #     manifests: |
      #       k8s/namespace.yaml
      #       k8s/config/
      #       k8s/database/
      #       k8s/backend/
      #       k8s/frontend/
      #       k8s/ingress/
      #       k8s/bonus/
